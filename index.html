        background: var(--bg);

        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);

    :root {
        --bg: #0f172a;
        --text: #ffffff;
        --glass: rgba(255, 255, 255, 0.03);
        --border: rgba(255, 255, 255, 0.08);
    }

    [data-theme="light"] {
        --bg: #f1f5f9;
        --text: #0f172a;
        --glass: rgba(0, 0, 0, 0.03);

body {

    font-family: 'Space Grotesk', sans-serif;

    background: #000;

    color: #fff;

    overflow-x: hidden;

    /* Heq hijen gri që krijohet kur klikon në mobile */

    -webkit-tap-highlight-color: transparent;

}


    @keyframes flash-glow {
        0% { background: rgba(99, 102, 241, 0); box-shadow: 0 0 0px rgba(99, 102, 241, 0); }
        50% { background: rgba(99, 102, 241, 0.3); box-shadow: 0 0 25px rgba(99, 102, 241, 0.5); }
        100% { background: rgba(255, 255, 255, 0.02); box-shadow: 0 0 0px rgba(99, 102, 241, 0); }
    }

    .scan-success-flash {
        animation: flash-glow 1s ease-out;
        border-color: #6366f1 !important;
        color: #fff !important;
    }



/* --- AUTH SUPERIOR DESIGN & SYSTEM CONFIG --- */
:root {
    --accent: #6366f1;
    --accent-glow: rgba(99, 102, 241, 0.4);
}



/* --- AUTH SHIELD & BACKDROP --- */
#auth-shield {
    position: fixed;
    inset: 0;
    z-index: 5000;
    background: radial-gradient(circle at center, #111 0%, #000 100%);
    backdrop-filter: blur(50px);
    -webkit-backdrop-filter: blur(50px); /* Për performancë në Safari/iPhone */
    display: flex;
    align-items: center;
    justify-content: center;
}

/* --- AUTH CARD (SUPERIOR STACKING) --- */
.auth-card {
    background: rgba(10, 10, 10, 0.8);
    border: 1px solid rgba(255, 255, 255, 0.03);
    position: relative;
    overflow: hidden;
    z-index: 1; /* Krijon bazën për elementet brenda */
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
}

/* DRITA RROTULLUESE (ME FIX PËR TOUCH) */
.auth-card::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%; width: 200%; height: 200%;
    background: conic-gradient(transparent, transparent, transparent, var(--accent));
    animation: rotate-border 6s linear infinite;
    z-index: -1; /* Qëndron prapa përmbajtjes */
    pointer-events: none; /* KRITIKE: Lejon touch-in të kalojë te rubrikat */
}

@keyframes rotate-border {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* --- RUBRIKAT (INPUTS) --- */
.auth-input-container {
    position: relative;
    z-index: 10; /* E ngre mbi dritën rrotulluese */
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    margin-bottom: 10px;
}

.auth-input-container:focus-within {
    border-bottom-color: var(--accent);
    transform: translateY(-2px);
}

.auth-input {
    background: transparent;
    width: 100%;
    padding: 16px 5px;
    outline: none;
    /* 16px parandalon Auto-Zoom-in e iPhone që bllokon ndërfaqen */
    font-size: 16px; 
    letter-spacing: 1px;
    color: #fff;
    border: none;
    position: relative;
    z-index: 20; /* Shtresa më e lartë e klikueshme */
}

/* --- BUTTON PREMIUM --- */
.btn-premium {
    background: #fff;
    color: #000;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    clip-path: polygon(0 0, 100% 0, 100% 70%, 90% 100%, 0 100%);
    cursor: pointer;
    border: none;
    position: relative;
    z-index: 30; /* Gjithmonë mbi çdo shtresë tjetër */
}

.btn-premium:hover {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 15px 30px var(--accent-glow);
}

.btn-premium:active {
    transform: scale(0.95);
}

/* --- INTRO CINEMATIC --- */
#intro-screen {
    position: fixed; inset: 0; z-index: 6000;
    background: #000; display: flex; align-items: center; justify-content: center;
    transition: opacity 1s ease;
}

.logo-box {
    position: relative;
    animation: initial-scale 2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

.logo-text {
    font-size: 3rem; font-weight: 700; letter-spacing: -2px;
    background: linear-gradient(to bottom, #ffffff 30%, #444444 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    opacity: 0;
    animation: text-reveal 1s 0.5s ease-out forwards;
    position: relative;
}

.light-sweep {
    position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    transform: skewX(-20deg);
    animation: sweep 1.5s 1s ease-out forwards;
    pointer-events: none;
}

@keyframes initial-scale { from { transform: scale(1.2); filter: blur(10px); } to { transform: scale(1); filter: blur(0); } }
@keyframes text-reveal { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes sweep { from { left: -100%; } to { left: 200%; } }

/* --- FACE ID UI --- */
#face-id-screen {
    position: fixed; inset: 0; z-index: 5500; background: #000;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes scan-move { 0% { top: 5%; opacity: 0; } 50% { opacity: 1; } 100% { top: 90%; opacity: 0; } }

.scanning-active #scan-line {
    display: block; position: absolute; width: 100%; height: 2px;
    background: var(--accent); box-shadow: 0 0 15px var(--accent);
    animation: scan-move 2s ease-in-out infinite;
}

.scanning-active #scanner-wrapper { border-color: rgba(99, 102, 241, 0.3); transform: scale(1.05); }
.auth-success #face-icon { color: #10b981; filter: drop-shadow(0 0 10px #10b981); }

/* --- APP UI & OVERLAY --- */
#menu-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
    z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
}

#menu-overlay.active { opacity: 1; pointer-events: auto; }

.glass-panel {
    background: rgba(15, 15, 15, 0.7);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 32px;
}

.sidebar {
    transition: all 0.6s cubic-bezier(0.32, 0.72, 0, 1);
    transform: translateX(-100%);
    z-index: 1001;
}

.sidebar.open { transform: translateX(0); }

.ios-btn:active { transform: scale(0.9) brightness(1.2); }

.cat-card { transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.05); }

.cat-card.selected {
    background: #fff !important; color: #000 !important;
    transform: translateY(-5px); box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
}

#main-app { opacity: 0; transform: translateY(30px); transition: all 1s ease; }
.no-scrollbar::-webkit-scrollbar { display: none; }

/* AI Scanner Loading Overlay */
#ai-loader {
    display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.8);
    border-radius: 32px; z-index: 50; flex-direction: column; align-items: center; justify-content: center;
}

/* Shto këtë klasë që JS do ta përdorë për ta zhdukur intro-n */
.hidden-intro {
    opacity: 0 !important;
    pointer-events: none !important;
    visibility: hidden !important;
    transition: all 1s ease-out;
}


/* --- CHART DYNAMIC SYSTEM --- */
#chart-container {
    max-height: 0;       /* Fillon i mbyllur */
    opacity: 0;          /* I padukshëm */
    overflow: hidden;    /* Parandalon daljen e grafikut jashtë kornizës gjatë hapjes */
    transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1); /* Efekt hapje premium Apple-style */
    margin-bottom: 0;
}

/* Kjo klasë do të shtohet/hiqet automatikisht nga JS */
.chart-active {
    max-height: 250px !important; 
    opacity: 1 !important;
    margin-bottom: 2.5rem !important;
}

#appChart {
    width: 100% !important;
    height: 180px !important;
    filter: drop-shadow(0 10px 15px rgba(99, 102, 241, 0.2)); /* Shkëlqim i lehtë nën vijën e grafikut */
}



#appChart {
    transition: filter 0.5s ease;
}

/* Kjo do të aplikohet përmes JS nëse dëshiron më vonë */
.chart-danger {
    filter: drop-shadow(0 10px 15px rgba(239, 68, 68, 0.4)) !important;
}







   
    /* Keypad Buttons */
    .num-key {
        width: 4rem; /* 64px */
        height: 4rem;
        border-radius: 9999px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        font-weight: 300;
        color: white;
        background-color: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(12px);
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        margin-left: auto;
        margin-right: auto;
        cursor: pointer;
        outline: none;
        -webkit-tap-highlight-color: transparent;
    }

    .num-key:active {
        background-color: rgba(99, 102, 241, 0.2);
        transform: scale(0.9);
        border-color: rgba(99, 102, 241, 0.4);
    }

    /* PIN Dots */
    .dot {
        width: 1rem;
        height: 1rem;
        border-radius: 9999px;
        border: 2px solid rgba(99, 102, 241, 0.3);
        transition: all 0.3s ease;
    }

    .dot.active {
        background-color: #6366f1;
        border-color: #6366f1;
        box-shadow: 0 0 15px rgba(99, 102, 241, 0.6);
        transform: scale(1.25);
    }

    /* Animations */
    @keyframes shake-pin {
        0%, 100% { transform: translateX(0); }
        20%, 60% { transform: translateX(-10px); }
        40%, 80% { transform: translateX(10px); }
    }
    
    .shake { 
        animation: shake-pin 0.4s cubic-bezier(.36,.07,.19,.97) both; 
    }

    /* Unlock Transition */
    #auth-shield.unlocked {
        opacity: 0;
        transform: scale(1.5);
        filter: blur(40px);
        pointer-events: none;
    }

    /* Light Mode Support */
    [data-theme="light"] #auth-shield {
        background: radial-gradient(circle at center, #f8fafc 0%, #e2e8f0 100%) !important;
    }

    [data-theme="light"] .num-key {
        background-color: rgba(0, 0, 0, 0.03);
        border-color: rgba(0, 0, 0, 0.05);
        color: #0f172a;
    }

    [data-theme="light"] #auth-title {
        color: #0f172a;
    }

    [data-theme="light"] .dot {
        border-color: rgba(0, 0, 0, 0.1);
    }






</style>

   Konfirmo

<script>
    // 1. KONFIGURIMI I IKONAVE
    const iconMap = {
        food: `<svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 7.5l-9-4.5-9 4.5M3 7.5v9l9 4.5 9-4.5v-9M12 3v18M3 7.5l9 4.5 9-4.5"/></svg>`,
        travel: `<svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>`,
        bill: `<svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 11-7.6-11.7M16 5l3 3m0 0l3 3m-3-3l-3 3m3-3H9"/></svg>`,
        style: `<svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M9 10V6a3 3 0 016 0v4M4.5 10h15l1 11H3.5l1-11z"/></svg>`,
        health: `<svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>`,
        assets: `<svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2"/></svg>`
    };

    // 2. DATABASE DHE SHTETI I SISTEMIT
    let db = {
        expenses: JSON.parse(localStorage.getItem('f_pro_v3')) || [],
        limit: parseFloat(localStorage.getItem('f_pro_lim_v3')) || 500,
        chart: null
    };

    let currentCurrency = { code: 'EUR', symbol: '€', rate: 1 };
    let editIndex = null; // Variabla kyçe për editimin që do të kontrollohet nga butoni

    // 3. LOAD & INITIALIZATION
    window.onload = () => {
        renderUI();
        initChart();
    };

    function renderUI() {
        const totalBase = db.expenses.reduce((s, a) => s + a.amount, 0);
        const limitBase = db.limit;
        
        const totalConverted = (totalBase * currentCurrency.rate).toFixed(2);
        const limitConverted = (limitBase * currentCurrency.rate).toFixed(2);
        const remainingConverted = (limitConverted - totalConverted).toFixed(2);

        document.getElementById('mainBalance').innerText = `${totalConverted} ${currentCurrency.symbol}`;
        document.getElementById('limitText').innerText = `${limitConverted} ${currentCurrency.symbol}`;
        const remEl = document.getElementById('remainingText');
        remEl.innerText = `${remainingConverted} ${currentCurrency.symbol}`;
        remEl.style.color = (limitBase - totalBase) < 0 ? '#ef4444' : '#10b981';

        const container = document.getElementById('listContainer');
        container.innerHTML = db.expenses.length ? '' : '<p class="text-center opacity-20 py-10 uppercase text-[10px] tracking-widest">Nuk ka shënime</p>';

        db.expenses.slice(0, 10).forEach((exp, index) => {
            const val = (exp.amount * currentCurrency.rate).toFixed(2);
            const row = document.createElement('div');
            row.className = "glass-panel p-5 flex justify-between items-center mb-4 group animate-in fade-in transition-all hover:bg-white/[0.03]";
            row.innerHTML = `
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-white/5 rounded-2xl flex items-center justify-center">${iconMap[exp.icon] || ''}</div>
                    <div>
                        <h4 class="font-bold text-[10px] uppercase tracking-widest">${exp.cat}</h4>
                        <p class="text-[8px] opacity-40 font-medium">${exp.date}</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <span class="font-black text-sm text-white/90">-${val} ${currentCurrency.symbol}</span>
                    <div class="flex items-center gap-1">
                        <button onclick="openEditFromToast(${index})" class="p-2 bg-indigo-500/10 hover:bg-indigo-500/20 text-indigo-400 rounded-xl transition-all">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7M18.5 2.5a2.121 2.121 0 113 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        </button>
                        <button onclick="deleteExpense(${index})" class="p-2 text-red-500/20 hover:text-red-500 transition-all">
                            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                        </button>
                    </div>
                </div>`;
            container.appendChild(row);
        });

        updateChartData();
    }

    // 4. CHART LOGIC
    function initChart() {
        const ctx = document.getElementById('appChart').getContext('2d');
        const gradient = ctx.createLinearGradient(0, 0, 0, 180);
        gradient.addColorStop(0, 'rgba(99, 102, 241, 0.4)');
        gradient.addColorStop(1, 'rgba(99, 102, 241, 0)');

        db.chart = new Chart(ctx, {
            type: 'line',
            data: { 
                labels: [], 
                datasets: [{ 
                    data: [], 
                    borderColor: '#6366f1', 
                    borderWidth: 4, 
                    tension: 0.4, 
                    fill: true, 
                    backgroundColor: gradient,
                    pointRadius: 0,
                    pointHoverRadius: 6
                }] 
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false, 
                plugins: { legend: { display: false } }, 
                scales: { 
                    x: { display: false }, 
                    y: { display: false, beginAtZero: true } 
                } 
            }
        });
    }

    function updateChartData() {
        const container = document.getElementById('chart-container');
        if (!container || !db.chart) return;

        if (db.expenses.length > 0) {
            container.classList.add('chart-active');
            const totalBase = db.expenses.reduce((s, a) => s + a.amount, 0);
            const isOverLimit = totalBase > db.limit;
            const themeColor = isOverLimit ? '#ef4444' : '#6366f1';
            const bgColor = isOverLimit ? 'rgba(239, 68, 68, 0.2)' : 'rgba(99, 102, 241, 0.2)';

            const lastExpenses = [...db.expenses].slice(0, 7).reverse();
            db.chart.data.labels = lastExpenses.map(e => e.cat);
            db.chart.data.datasets[0].data = lastExpenses.map(e => parseFloat((e.amount * currentCurrency.rate).toFixed(2)));
            db.chart.data.datasets[0].borderColor = themeColor;
            db.chart.data.datasets[0].backgroundColor = bgColor;
            db.chart.update();
        } else {
            container.classList.remove('chart-active');
        }
    }

    // 5. VEPRIMET KRYESORE (SUBMIT, EDIT, DELETE)
    // Ky funksion tani është i nderlidhur me butonin Konfirmo
    function submitExpense() {
        const amtInput = document.getElementById('inpAmount');
        const amt = parseFloat(amtInput.value);
        if(!amt || amt <= 0) return;

        if (editIndex !== null) {
            // ZBATIMI I EDITIMIT REAL
            db.expenses[editIndex].amount = amt;
            db.expenses[editIndex].cat = document.getElementById('selectedCat').value;
            db.expenses[editIndex].icon = document.getElementById('selectedIcon').value;
            
            editIndex = null; // Kthehemi në gjendje shto
            document.querySelector('.ios-btn').innerText = "Konfirmo";
        } else {
            // SHTIM I RI
            db.expenses.unshift({ 
                amount: amt, 
                cat: document.getElementById('selectedCat').value, 
                icon: document.getElementById('selectedIcon').value,
                date: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) 
            });
            showQuickEditToast(0);
        }

        saveAndRefresh();
        hideModal('addModal');
        amtInput.value = '';
    }

    function openEditFromToast(index) {
        editIndex = index; // Këtu përcaktohet rreshti për editim
        const exp = db.expenses[index];

        // Mbushim fushat e formës
        document.getElementById('inpAmount').value = exp.amount;
        document.getElementById('selectedCat').value = exp.cat;
        document.getElementById('selectedIcon').value = exp.icon;

        // Ndryshojmë tekstin e butonit Konfirmo
        const btn = document.querySelector('.ios-btn');
        if(btn) btn.innerText = "Përditëso";
        
        showAddModal();
    }

    function deleteExpense(index) {
        if(confirm("Fshi këtë shënim?")) {
            db.expenses.splice(index, 1);
            saveAndRefresh();
        }
    }

    function saveAndRefresh() {
        localStorage.setItem('f_pro_v3', JSON.stringify(db.expenses));
        renderUI();
    }

    // 6. VALUTAT DHE MODALET
    async function changeSystemCurrency(code, symbol) {
        if (code !== 'EUR') {
            try {
                const res = await fetch(`https://api.exchangerate-api.com/v4/latest/EUR`);
                const data = await res.json();
                currentCurrency = { code, symbol, rate: data.rates[code] };
            } catch (e) { alert("Sistemi: Gabim në valutë."); }
        } else {
            currentCurrency = { code: 'EUR', symbol: '€', rate: 1 };
        }
        renderUI();
    }

    function showQuickEditToast(index) {
        const old = document.querySelector('.quick-edit-toast'); 
        if(old) old.remove();
        
        const toast = document.createElement('div');
        toast.className = "quick-edit-toast fixed bottom-6 right-6 z-[100] bg-indigo-600 text-white px-4 py-3 rounded-2xl shadow-2xl flex items-center gap-4 animate-in slide-in-from-right-full";
        
        const displayAmt = (db.expenses[index].amount * currentCurrency.rate).toFixed(2);
        
        toast.innerHTML = `
            <div>
                <span class="text-[9px] block opacity-70 uppercase tracking-tighter">Shtuar me sukses</span>
                <span class="text-xs font-bold">${displayAmt}${currentCurrency.symbol}</span>
            </div>
            <button onclick="this.parentElement.remove(); openEditFromToast(${index})" class="bg-white text-indigo-600 px-3 py-1.5 rounded-xl text-[10px] font-black uppercase hover:bg-opacity-90 transition-all">
                Edito
            </button>`;
            
        document.body.appendChild(toast);
        setTimeout(() => { if(toast) toast.remove(); }, 4000);
    }

    function showLimitModal() {
        let l = prompt("Vendos limitin tënd mujor:", db.limit);
        if (l && !isNaN(l)) { 
            db.limit = parseFloat(l); 
            localStorage.setItem('f_pro_lim_v3', db.limit); 
            renderUI();
        }
    }

    // 7. UI UTILS
    function clearAll() { if(confirm("Fshi të gjitha të dhënat?")) { db.expenses = []; localStorage.clear(); location.reload(); } }
    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('menu-overlay').classList.toggle('active'); }
    function showAddModal() { document.getElementById('addModal').classList.remove('hidden'); }
    
    function hideModal(id) { 
        document.getElementById(id).classList.add('hidden'); 
        if(id === 'addModal') {
            editIndex = null; // Resetojmë gjendjen kur mbyllet që të mos editohet gabimisht rreshti
            const btn = document.querySelector('.ios-btn');
            if(btn) btn.innerText = "Konfirmo";
            document.getElementById('inpAmount').value = '';
        }
    }

    function setCat(cat, icon, el) { 
        document.querySelectorAll('.cat-card').forEach(c => c.classList.remove('selected')); 
        el.classList.add('selected'); 
        document.getElementById('selectedCat').value = cat; 
        document.getElementById('selectedIcon').value = icon; 
    }

    // 8. INTRO SCREEN LOGIC
    document.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
            const intro = document.getElementById('intro-screen');
            const mainApp = document.getElementById('main-app');
            const authShield = document.getElementById('auth-shield');

            if (intro) {
                intro.classList.add('hidden-intro');
                setTimeout(() => intro.remove(), 1000);
            }

            if (mainApp) {
                mainApp.style.opacity = "1";
                mainApp.style.transform = "translateY(0)";
            }
            
            if (authShield) {
                authShield.style.display = 'none'; 
            }
        }, 3500);
    });



async function performAIScan(event) {
    const file = event.target.files[0];
    if (!file) return;

    const scanBtn = event.target.previousElementSibling;
    const originalText = scanBtn.innerHTML;
    
    // UI Feedback: Butoni bëhet "Loading"
    scanBtn.innerHTML = `<svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" stroke-width="4"/></svg>`;
    scanBtn.classList.add('opacity-50');

    try {
        const worker = await Tesseract.createWorker('eng');
        const { data: { text } } = await worker.recognize(file);
        await worker.terminate();

        // Regex i avancuar për të gjetur numrat në formate si: 12.50 ose 12,50
        const regexTotal = /(total|shuma|amount|totaal|suma)[\s:]+([\d.,]+)/i;
        const match = text.match(regexTotal) || text.match(/\d+[\.,]\d{2}/g);

        if (match) {
            let foundAmount = Array.isArray(match) ? match[match.length - 1] : match[2];
            foundAmount = foundAmount.replace(',', '.');
            
            const amountField = document.getElementById('inpAmount');
            if(amountField) {
                amountField.value = parseFloat(foundAmount);
                
                // --- SHTESAT E PERSOSURA ---
                
                // 1. Haptic Feedback (Vibrimi)
                if (window.navigator.vibrate) {
                    window.navigator.vibrate(40); // Një goditje e shkurtër "Apple-like"
                }

                // 2. Flash Effect & Glow
                amountField.classList.add('scan-success-flash');
                setTimeout(() => amountField.classList.remove('scan-success-flash'), 1000);
            }
        } else {
            alert("Nuk u gjet asnjë shumë. Provo një foto më të qartë.");
        }
    } catch (error) {
        console.error("Skanimi dështoi:", error);
    } finally {
        scanBtn.innerHTML = originalText;
        scanBtn.classList.remove('opacity-50');
    }
}



async function downloadPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    
    // --- DIZAJNI I LOGOS "faturaIME" ---
    // Simboli (Një katror i rrumbullakosur indigo)
    doc.setFillColor(99, 102, 241);
    doc.roundedRect(14, 15, 10, 10, 2, 2, 'F');
    
    // Teksti i Logos
    doc.setFont("helvetica", "bold");
    doc.setFontSize(18);
    doc.setTextColor(30, 41, 59); // Slate 800
    doc.text("fatura", 28, 23);
    
    doc.setTextColor(99, 102, 241); // Indigo 600
    doc.text("IME", 47, 23);

    // Linja dekorative nën logo
    doc.setDrawColor(226, 232, 240); // Slate 200
    doc.line(14, 32, 196, 32);

    // --- INFORMACIONET E RAPORTIT ---
    doc.setFontSize(8);
    doc.setTextColor(100);
    doc.setFont("helvetica", "normal");
    const dateNow = new Date().toLocaleDateString('sq-AL', { day: 'numeric', month: 'long', year: 'numeric' });
    doc.text(`DATA E GJENERIMIT: ${dateNow.toUpperCase()}`, 14, 40);
    doc.text(`VALUTA E SISTEMIT: ${currentCurrency.code}`, 14, 44);

    // --- TABELA E SHPENZIMEVE ---
    const tableRows = [];
    db.expenses.forEach(exp => {
        // Përcaktimi i emrit të marketit/shërbimit nëse ekziston, përndryshe kategoria
        const description = exp.cat.toUpperCase();
        const rowData = [
            exp.date,
            description,
            `${(exp.amount * currentCurrency.rate).toFixed(2)} ${currentCurrency.symbol}`
        ];
        tableRows.push(rowData);
    });

    doc.autoTable({
        startY: 50,
        head: [['DATA', 'PËRSHKRIMI I KATEGORISË', 'SHUMA']],
        body: tableRows,
        theme: 'striped',
        headStyles: { 
            fillColor: [30, 41, 59], 
            fontSize: 9, 
            fontStyle: 'bold', 
            halign: 'left',
            cellPadding: 4
        },
        bodyStyles: { 
            fontSize: 9, 
            cellPadding: 4,
            textColor: [51, 65, 85]
        },
        columnStyles: {
            0: { cellWidth: 35 },
            2: { halign: 'right', fontStyle: 'bold' }
        },
        alternateRowStyles: { fillColor: [248, 250, 252] },
        margin: { left: 14, right: 14 }
    });

    // --- TOTALI DHE PIKA FINALE ---
    const finalY = doc.lastAutoTable.finalY + 15;
    const totalBase = db.expenses.reduce((s, a) => s + a.amount, 0);
    const totalConverted = (totalBase * currentCurrency.rate).toFixed(2);

    // Kutia e Totalit
    doc.setFillColor(99, 102, 241);
    doc.roundedRect(130, finalY - 8, 66, 12, 1, 1, 'F');
    
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(11);
    doc.text(`TOTALI: ${totalConverted} ${currentCurrency.symbol}`, 135, finalY);

    // Footer - Gjeneruar nga AI
    doc.setTextColor(148, 163, 184); // Slate 400
    doc.setFontSize(8);
    doc.setFont("helvetica", "italic");
    doc.text("Ky raport është gjeneruar automatikisht nga sistemi faturaIME dhe është i vlefshëm pa vulë.", 14, 285);

    // Save & Haptic
    doc.save(`Raporti_faturaIME_${currentCurrency.code}.pdf`);
    if (window.navigator.vibrate) window.navigator.vibrate([50, 30, 50]);
}







// 1. NDRYSHIMI I IKONËS SË SISTEMIT (iOS & Android)
function updateSystemIcon(style) {
    let iconUrl = "";
    
    // Përcaktojmë URL-të e ikonave bazuar në stilin e zgjedhur
    if(style === 'indigo') iconUrl = "https://img.icons8.com/ios-filled/512/FFFFFF/bill.png";
    if(style === 'black') iconUrl = "https://img.icons8.com/ios-filled/512/6366f1/bill.png";
    if(style === 'white') iconUrl = "https://img.icons8.com/ios-filled/512/000000/bill.png";

    // Gjejmë ose krijojmë elementet e ikonave në <head>
    let appleIcon = document.querySelector('link[rel="apple-touch-icon"]');
    let favicon = document.querySelector('link[rel="icon"]');

    if (appleIcon) appleIcon.href = iconUrl;
    if (favicon) favicon.href = iconUrl;

    // Ruajmë preferencën
    localStorage.setItem('app-system-icon', style);
    
    // Feedback vizual
    if (window.navigator.vibrate) window.navigator.vibrate([40, 40]);
    alert("Ikona u ndryshua! Nëse e keni shtuar në Home Screen, mund të duhet pak kohë që sistemi ta rifreskojë.");
}

// 2. NDRYSHIMI I TEMËS (DARK / LIGHT)
function updateAppTheme() {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') !== 'light';
    const newTheme = isDark ? 'light' : 'dark';
    
    html.setAttribute('data-theme', newTheme);
    localStorage.setItem('app-theme', newTheme);
    
    // Animacioni i butonit (Toggle)
    const ball = document.getElementById('theme-ball');
    if (newTheme === 'light') {
        ball.style.transform = 'translateX(16px)';
        ball.style.backgroundColor = '#ffffff';
    } else {
        ball.style.transform = 'translateX(0px)';
        ball.style.backgroundColor = '#6366f1';
    }

    if (window.navigator.vibrate) window.navigator.vibrate(30);
}

// 3. LOAD PREFERENCES (Shtoje këtë te window.onload)
function loadPreferences() {
    const savedIcon = localStorage.getItem('app-system-icon');
    if(savedIcon) updateSystemIcon(savedIcon);
    
    const savedTheme = localStorage.getItem('app-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
}

const SecureVault = {
    currentPin: "",
    pinKey: "f_pro_secure_pin",
    emailKey: "f_pro_recovery_mail",

    init() {
        const hasPin = localStorage.getItem(this.pinKey);
        document.getElementById('auth-title').innerText = hasPin ? "Mirësevini" : "Konfiguro Qasjen";
        document.getElementById('auth-subtitle').innerText = hasPin ? "Shënoni kodin tuaj" : "Krijoni një PIN 4-shifror";
    },

    input(num) {
        if (this.currentPin.length < 4) {
            this.currentPin += num;
            this.haptic(15);
            this.updateDots();
            if (this.currentPin.length === 4) setTimeout(() => this.verify(), 300);
        }
    },

    delete() {
        this.currentPin = this.currentPin.slice(0, -1);
        this.haptic(10);
        this.updateDots();
    },

    updateDots() {
        const dots = document.querySelectorAll('.dot');
        dots.forEach((dot, i) => {
            dot.classList.toggle('active', i < this.currentPin.length);
        });
    },

    async verify() {
        const storedPin = localStorage.getItem(this.pinKey);
        const encodedInput = btoa(this.currentPin);

        if (!storedPin) {
            // KONFIGURIMI PËR HERË TË PARË
            const email = prompt("Vendosni email-in tuaj për rimëkëmbje (E detyrueshme):");
            if (email && email.includes('@')) {
                localStorage.setItem(this.pinKey, encodedInput);
                localStorage.setItem(this.emailKey, btoa(email));
                this.accessGranted("Sistemi u rregullua");
            } else {
                alert("Email-i kërkohet për siguri.");
                this.resetKeys();
            }
        } else {
            // VERIFIKIMI NORMAL
            if (storedPin === encodedInput) {
                this.accessGranted("Qasja u lejua");
            } else {
                this.accessDenied();
            }
        }
    },

    accessGranted(msg) {
        this.haptic([30, 50, 30]);
        document.getElementById('auth-subtitle').innerText = msg;
        document.getElementById('auth-subtitle').style.color = "#10b981";
        
        // Animacioni i drynit
        document.getElementById('lock-path').setAttribute('d', 'M8 11V7a4 4 0 118 0v4m-8 0a2 2 0 00-2 2v6a2 2 0 002 2h8a2 2 0 002-2v-6a2 2 0 00-2-2H8z');
        document.getElementById('lock-container').style.borderColor = "#10b981";

        setTimeout(() => {
            document.getElementById('auth-shield').classList.add('unlocked');
            // Mundëson scroll-in e faqes pas zhbllokimit
            document.body.style.overflow = "auto";
        }, 600);
    },

    accessDenied() {
        this.haptic([100, 50, 100]);
        const container = document.getElementById('pin-visualizer');
        container.classList.add('shake');
        setTimeout(() => {
            container.classList.remove('shake');
            this.resetKeys();
        }, 500);
    },

    resetKeys() {
        this.currentPin = "";
        this.updateDots();
    },

    initiateRecovery() {
        const storedEmail = localStorage.getItem(this.emailKey);
        if (!storedEmail) return alert("Asnjë email nuk është konfiguruar.");

        const emailInput = prompt("Vërtetoni email-in tuaj të rimëkëmbjes:");
        if (btoa(emailInput) === storedEmail) {
            const newPin = prompt("Email i saktë! Shënoni PIN-in e ri (4 shifra):");
            if (newPin && newPin.length === 4) {
                localStorage.setItem(this.pinKey, btoa(newPin));
                alert("PIN u ndryshua. Ju lutem hyni.");
                location.reload();
            }
        } else {
            alert("Email i gabuar. Rimëkëmbja dështoi.");
        }
    },

    haptic(pattern) {
        if (window.navigator.vibrate) window.navigator.vibrate(pattern);
    }
};

// Starto Vault-in
document.addEventListener('DOMContentLoaded', () => {
    SecureVault.init();
    // Ndalon scroll-in derisa të kryhet auth
    document.body.style.overflow = "hidden";
});













function updateSystemIcon(colorType) {
    const iconMap = {
        'indigo': 'https://img.icons8.com/ios-filled/512/6366f1/bill.png',
        'black': 'https://img.icons8.com/ios-filled/512/000000/bill.png',
        'white': 'https://img.icons8.com/ios-filled/512/FFFFFF/bill.png'
    };

    const newSrc = iconMap[colorType];
    
    // Ndrysho Favicon
    let link = document.querySelector("link[rel~='icon']");
    if (!link) {
        link = document.createElement('link');
        link.rel = 'icon';
        document.head.appendChild(link);
    }
    link.href = newSrc;

    // Ndrysho Apple Touch Icon (për iOS)
    let appleIcon = document.querySelector("link[rel~='apple-touch-icon']");
    if (!appleIcon) {
        appleIcon = document.createElement('link');
        appleIcon.rel = 'apple-touch-icon';
        document.head.appendChild(appleIcon);
    }
    appleIcon.href = newSrc;
    
    localStorage.setItem('sys_icon_choice', colorType);
}
