.bottom-nav{position:fixed;left:0;right:0;bottom:0;z-index:40;height:calc(var(--nav-h) + var(--safe-b));padding-bottom:var(--safe-b);display:flex;align-items:stretch;justify-content:space-around;background:color-mix(in srgb,var(--bg-elev) 86%,transparent);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border);}

.legend .lv{margin-left:auto;font-weight:600;}
.chat{display:flex;flex-direction:column;gap:var(--s-3);padding-bottom:var(--s-4);}
.bubble{max-width:84%;padding:var(--s-3) var(--s-4);border-radius:var(--r-lg);white-space:pre-wrap;line-height:1.45;font-size:var(--fs-sm);animation:blockIn 0.35s var(--ease-ios) both;}
.bubble.ai{align-self:flex-start;background:var(--surface-2);border-bottom-left-radius:var(--s-1);}
.bubble.me{align-self:flex-end;background:var(--accent-grad);color:#fff;border-bottom-right-radius:var(--s-1);box-shadow:0 8px 20px var(--accent-glow);}
.chat-input{position:fixed;left:0;right:0;bottom:calc(var(--nav-h) + var(--safe-b));z-index:30;padding:var(--s-3) var(--s-4);background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:blur(20px);border-top:1px solid var(--border);}
.chat-input .inner{max-width:var(--maxw);margin:0 auto;display:flex;gap:var(--s-2);}
.suggest-row{display:flex;gap:var(--s-2);flex-wrap:wrap;margin-bottom:var(--s-3);}
.set-group{margin-bottom:var(--s-5);}
.set-row{display:flex;align-items:center;justify-content:space-between;gap:var(--s-3);padding:var(--s-3) 0;border-bottom:1px solid var(--border);}
.set-row:last-child{border-bottom:none;}
.switch{width:48px;height:28px;border-radius:var(--r-full);background:var(--surface-3);position:relative;transition:background var(--t-fast);flex:0 0 auto;}
.switch.on{background:var(--accent);box-shadow:0 0 12px var(--accent-glow);}
.switch i{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:transform var(--t-fast) var(--ease-spring);}
.switch.on i{transform:translateX(20px);}
.lock{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:var(--s-5);padding:var(--s-6);}
.pin-dots{display:flex;gap:var(--s-3);}
.pin-dots i{width:14px;height:14px;border-radius:50%;border:2px solid var(--border-strong);transition:background var(--t-fast),border-color var(--t-fast);}
.pin-dots i.on{background:var(--accent);border-color:var(--accent);box-shadow:0 0 10px var(--accent-glow);}
.pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:var(--s-4);}
.pin-pad button{height:72px;border-radius:50%;background:var(--surface-2);font-size:var(--fs-xl);font-weight:600;}
.shake{animation:shake 0.4s;}
@keyframes shake{0%,100%{transform:none}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}

</style>

    { path: "/settings", i18n: "nav.settings", svg: "M12 15a3 3 0 100-6 3 3 0 000 6zM19.4 15a1.6 1.6 0 00.3 1.8l.1.1a2 2 0 11-2.8 2.8l-.1-.1a1.6 1.6 0 00-2.7 1.1V21a2 2 0 11-4 0v-.1A1.6 1.6 0 006 19.4l-.1.1a2 2 0 11-2.8-2.8l.1-.1A1.6 1.6 0 003 13.6a2 2 0 110-4h.1A1.6 1.6 0 004.6 6l-.1-.1a2 2 0 112.8-2.8l.1.1A1.6 1.6 0 0010 3.6V3a2 2 0 114 0v.1A1.6 1.6 0 0019.4 6l.1-.1a2 2 0 112.8 2.8l-.1.1a1.6 1.6 0 00-1.1 2.7H21a2 2 0 110 4h-.1a1.6 1.6 0 00-1.5 1z" }
  ];
  function bottomNav() {
    const links = ITEMS.map((it) => {
      const a = h("a", { href: "#" + it.path }, [icon(it.svg, { size: 22 }), h("span", {}, t(it.i18n))]);
      a.dataset.path = it.path;
      return a;
    });
    const nav = h("nav.bottom-nav", {}, links);
    const setActive = (path) => links.forEach((a) => a.classList.toggle("is-active", a.dataset.path === path));
    on("nav:changed", (c) => setActive(c.path));
    setActive(location.hash.slice(1).split("?")[0] || "/");
    return nav;
  }

  // faturaime/src/ui/components/fab.js
  init_dom();
  init_sheet();
  init_Transactions();
  function fab(navigate) {
    let timer;
    const quick = () => openSheet(({ close }) => h("div.col", { style: { gap: "var(--s-3)" } }, [
      h("button.btn.btn--primary.btn--block", { onClick: () => {
        close();
        openTxEditor({ type: "expense" });
      } }, "\uFF0B  Shto shpenzim"),
      h("button.btn.btn--ghost.btn--block", { onClick: () => {
        close();
        openTxEditor({ type: "income" });
      } }, "\uFF0B  Shto t\xEB ardhur"),
      h("button.btn.btn--ghost.btn--block", { onClick: () => {
        close();
        navigate("/assistant");
      } }, "\u{1F4AC}  Pyet FaturaIME AI")
    ]), { title: "Veprime t\xEB shpejta" });
    const btn = h("button.fab", {
      "aria-label": "Shto",
      onClick: () => openTxEditor({ type: "expense" }),
      oncontextmenu: (e) => {
        e.preventDefault();
        quick();
      },
      onpointerdown: () => {
        timer = setTimeout(quick, 450);
      },
      onpointerup: () => clearTimeout(timer),
      onpointerleave: () => clearTimeout(timer)
    }, [icon("M12 5v14M5 12h14", { size: 26, width: 2.5 })]);
    return btn;
  }

  // faturaime/src/app/App.js
  function mountApp() {
    const root = document.getElementById("app");
    const outlet = h("main", { id: "outlet" });
    const router = createRouter({ routes, outlet, fallback: "/" });
    const nav = bottomNav();
    const action = fab(router.navigate);
    root.replaceChildren(outlet, action, nav);
    router.start();
    return router;
  }

  // faturaime/src/main.js
  init_toast();
  async function boot() {
    try {
      await initCrypto();
      await loadPrefs();
      await Promise.all([loadTransactions(), loadBudgets(), loadGoals()]);
      if (isLockEnabled()) await lockScreen();
      mountApp();
      registerSW();
    } catch (err) {
      console.error("[boot]", err);
      document.getElementById("app").innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-muted)">Ndodhi nj\xEB gabim gjat\xEB nisjes. Rifresko faqen.</div>';
    }
  }
  function registerSW() {
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        Promise.reject(0).catch((e) => console.warn("SW:", e));
      });
    }
  }
  boot();
})();
</script>
</body>
</html>
