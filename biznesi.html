<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>APEX SUPREME OS</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root { --accent: #8b5cf6; --bg: #000000; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: white;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        /* High-End Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 35px;
        }

        /* Dynamic Background Glow */
        .glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--accent);
            filter: blur(180px);
            opacity: 0.15;
            z-index: -1;
            border-radius: 50%;
            transition: background 0.5s ease;
        }

        /* Transitions */
        .page-layer {
            position: fixed;
            inset: 0;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        
        .layer-hidden { transform: translateY(100%) scale(0.9); opacity: 0; pointer-events: none; }
        .layer-active { transform: translateY(0) scale(1); opacity: 1; pointer-events: all; }

        /* Ledger Items Animation */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .tr-anim { animation: slideUp 0.4s ease forwards; }

        /* Custom Inputs */
        .os-input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 22px;
            padding: 18px;
            width: 100%;
            color: white;
            outline: none;
            transition: 0.3s;
        }
        .os-input:focus { border-color: var(--accent); background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<div class="glow top-[-100px] right-[-100px]" id="accentGlow"></div>

<div id="mainDashboard" class="page-layer layer-active p-6 flex flex-col">
    <header class="flex justify-between items-center mb-10">
        <div>
            <h1 id="displayBizName" class="text-xs font-black uppercase tracking-[0.4em] text-violet-400">APEX SUPREME</h1>
            <p id="liveClock" class="text-[10px] font-bold opacity-30 mt-1">00:00:00</p>
        </div>
        <div class="flex gap-3">
            <button onclick="generatePDF()" class="w-12 h-12 glass flex items-center justify-center active:scale-90 transition">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            </button>
            <button onclick="openSettings()" class="w-12 h-12 glass flex items-center justify-center active:scale-90 transition">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
            </button>
        </div>
    </header>

    <div class="flex-1 overflow-y-auto no-scrollbar space-y-6">
        <div class="glass p-10 bg-gradient-to-br from-white/[0.05] to-transparent">
            <p class="text-[10px] font-black uppercase tracking-[0.3em] opacity-40 mb-2">Bilanci Total</p>
            <h2 id="balance" class="text-6xl font-black italic tracking-tighter">0.00 €</h2>
            <div class="flex gap-6 mt-8 pt-8 border-t border-white/5">
                <div>
                    <p class="text-[8px] font-bold opacity-30 uppercase mb-1">Të Hyra</p>
                    <p id="totalIn" class="text-emerald-400 font-black text-xl">0.00</p>
                </div>
                <div>
                    <p class="text-[8px] font-bold opacity-30 uppercase mb-1">Të Dalura</p>
                    <p id="totalOut" class="text-red-400 font-black text-xl">0.00</p>
                </div>
            </div>
        </div>

        <div class="glass p-6 space-y-4">
            <input type="number" id="trAmt" placeholder="0.00 €" class="os-input text-3xl font-black text-center italic">
            <input type="text" id="trDesc" placeholder="Përshkrimi..." class="os-input">
            <div class="grid grid-cols-2 gap-4">
                <button onclick="addTr('in')" class="h-16 rounded-[22px] bg-white text-black font-black text-[10px] uppercase tracking-widest active:scale-95 transition">Arkëto</button>
                <button onclick="addTr('out')" class="h-16 rounded-[22px] bg-zinc-900 border border-white/10 font-black text-[10px] uppercase tracking-widest active:scale-95 transition">Paguaj</button>
            </div>
        </div>

        <div class="px-2">
            <h3 class="text-[10px] font-black uppercase tracking-widest opacity-30 mb-6">Transaksionet</h3>
            <div id="ledger" class="space-y-3 pb-10">
                </div>
        </div>
    </div>
</div>

<div id="settingsLayer" class="page-layer layer-hidden bg-black/80 backdrop-blur-3xl p-8 flex flex-col overflow-y-auto no-scrollbar">
    <div class="flex justify-between items-center mb-12">
        <h2 class="text-3xl font-black italic tracking-tighter">Control Center</h2>
        <button onclick="closeSettings()" class="w-14 h-14 glass flex items-center justify-center text-3xl">&times;</button>
    </div>

    <div class="space-y-10">
        <section class="glass p-6">
            <h3 class="text-[10px] font-black uppercase tracking-widest opacity-40 mb-6">Personalizimi</h3>
            <div class="flex gap-4">
                <button onclick="setAccent('#8b5cf6')" class="w-10 h-10 rounded-full bg-[#8b5cf6] border-2 border-white/20"></button>
                <button onclick="setAccent('#10b981')" class="w-10 h-10 rounded-full bg-[#10b981] border-2 border-white/20"></button>
                <button onclick="setAccent('#f59e0b')" class="w-10 h-10 rounded-full bg-[#f59e0b] border-2 border-white/20"></button>
                <button onclick="setAccent('#ef4444')" class="w-10 h-10 rounded-full bg-[#ef4444] border-2 border-white/20"></button>
            </div>
        </section>

        <section class="glass p-6 space-y-4">
            <h3 class="text-[10px] font-black uppercase tracking-widest opacity-40">Profili</h3>
            <input type="text" id="bizNameIn" class="os-input" placeholder="Emri i Biznesit">
            <button onclick="saveProfile()" class="w-full py-4 bg-violet-600 rounded-2xl font-black text-[10px] uppercase tracking-widest">Ruaj Ndryshimet</button>
        </section>

        <section class="grid grid-cols-2 gap-4">
            <button onclick="exportData()" class="glass p-6 flex flex-col items-center gap-3">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                <span class="text-[8px] font-black uppercase">Backup</span>
            </button>
            <button onclick="hardReset()" class="glass p-6 flex flex-col items-center gap-3 border-red-500/20">
                <svg width="24" height="24" fill="none" stroke="#ef4444" stroke-width="2" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                <span class="text-[8px] font-black uppercase text-red-500">Reset</span>
            </button>
        </section>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('apex_supreme_db')) || [];
    let config = JSON.parse(localStorage.getItem('apex_supreme_config')) || { accent: '#8b5cf6', name: 'APEX SUPREME' };

    // Core Logic
    function addTr(type) {
        const amt = document.getElementById('trAmt').value;
        const desc = document.getElementById('trDesc').value;
        if(!amt || !desc) return;

        db.unshift({
            id: Date.now(),
            val: parseFloat(amt),
            desc: desc,
            type: type,
            date: new Date().toLocaleDateString('sq-AL'),
            time: new Date().toLocaleTimeString('sq-AL', { hour: '2-digit', minute: '2-digit' })
        });

        localStorage.setItem('apex_supreme_db', JSON.stringify(db));
        document.getElementById('trAmt').value = '';
        document.getElementById('trDesc').value = '';
        render();
    }

    function render() {
        const ledger = document.getElementById('ledger');
        ledger.innerHTML = '';
        let hi = 0, lo = 0;

        db.forEach((item, index) => {
            const isI = item.type === 'in';
            if(isI) hi += item.val; else lo += item.val;

            ledger.innerHTML += `
                <div class="glass p-5 flex justify-between items-center tr-anim" style="animation-delay: ${index * 0.05}s">
                    <div>
                        <h4 class="text-xs font-bold uppercase tracking-tight">${item.desc}</h4>
                        <p class="text-[8px] opacity-30 font-bold mt-1 uppercase">${item.date} • ${item.time}</p>
                    </div>
                    <div class="text-right font-black ${isI ? 'text-emerald-400' : 'text-red-400'} italic">
                        ${isI ? '+' : '-'}${item.val.toFixed(2)} €
                    </div>
                </div>
            `;
        });

        document.getElementById('balance').innerText = (hi - lo).toFixed(2) + " €";
        document.getElementById('totalIn').innerText = hi.toFixed(2);
        document.getElementById('totalOut').innerText = lo.toFixed(2);
    }

    // UI Functions
    function openSettings() { document.getElementById('settingsLayer').className = 'page-layer layer-active bg-black/80 backdrop-blur-3xl p-8 flex flex-col overflow-y-auto no-scrollbar'; }
    function closeSettings() { document.getElementById('settingsLayer').className = 'page-layer layer-hidden bg-black/80 backdrop-blur-3xl p-8 flex flex-col overflow-y-auto no-scrollbar'; }

    function setAccent(color) {
        config.accent = color;
        document.documentElement.style.setProperty('--accent', color);
        document.getElementById('accentGlow').style.background = color;
        localStorage.setItem('apex_supreme_config', JSON.stringify(config));
    }

    function saveProfile() {
        config.name = document.getElementById('bizNameIn').value || 'APEX SUPREME';
        document.getElementById('displayBizName').innerText = config.name;
        localStorage.setItem('apex_supreme_config', JSON.stringify(config));
        alert('U ruajt!');
    }

    function exportData() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "apex_backup.json");
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    }

    function hardReset() { if(confirm("Fshini çdo gjë?")) { localStorage.clear(); location.reload(); } }

   function generatePDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('p', 'mm', 'a4');
    const accentColor = config.accent || '#8b5cf6';
    
    // --- 1. HEADER DESIGN ---
    // Background Dark Header
    doc.setFillColor(15, 15, 15);
    doc.rect(0, 0, 210, 50, 'F');
    
    // Accent Line
    const hexToRgb = hex => hex.replace(/^#?([a-f\d])([a-f\d])([a-f\d])$/i,(m, r, g, b) => '#' + r + r + g + g + b + b).substring(1).match(/.{2}/g).map(x => parseInt(x, 16));
    const rgb = hexToRgb(accentColor);
    doc.setFillColor(rgb[0], rgb[1], rgb[2]);
    doc.rect(0, 48, 210, 2, 'F');

    // Title & Info
    doc.setTextColor(255, 255, 255);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(28);
    doc.text(config.name.toUpperCase(), 15, 25);
    
    doc.setFont("helvetica", "normal");
    doc.setFontSize(10);
    doc.setTextColor(150, 150, 150);
    doc.text("RAPORTI FINANCIAR PERIODIK", 15, 32);
    doc.text(`Data e Gjenerimit: ${new Date().toLocaleString('sq-AL')}`, 15, 38);

    // --- 2. SUMMARY BOXES ---
    let hi = 0, lo = 0;
    db.forEach(item => { if(item.type === 'in') hi += item.val; else lo += item.val; });
    const net = hi - lo;

    // Balance Box
    doc.setFillColor(245, 245, 245);
    doc.roundedRect(15, 60, 55, 25, 3, 3, 'F');
    doc.setTextColor(100, 100, 100);
    doc.setFontSize(8);
    doc.text("BALANCA NETO", 20, 68);
    doc.setTextColor(0, 0, 0);
    doc.setFontSize(14);
    doc.text(`${net.toFixed(2)} €`, 20, 78);

    // Income Box
    doc.setFillColor(230, 255, 240);
    doc.roundedRect(75, 60, 55, 25, 3, 3, 'F');
    doc.setTextColor(0, 150, 0);
    doc.setFontSize(8);
    doc.text("TOTALI I HYRJEVE", 80, 68);
    doc.setFontSize(14);
    doc.text(`+${hi.toFixed(2)} €`, 80, 78);

    // Expense Box
    doc.setFillColor(255, 235, 235);
    doc.roundedRect(135, 60, 55, 25, 3, 3, 'F');
    doc.setTextColor(200, 0, 0);
    doc.setFontSize(8);
    doc.text("TOTALI I DALJEVE", 140, 68);
    doc.setFontSize(14);
    doc.text(`-${lo.toFixed(2)} €`, 140, 78);

    // --- 3. TRANSACTION TABLE ---
    const rows = db.map((e, index) => [
        index + 1,
        e.date,
        e.desc.toUpperCase(),
        e.type === 'in' ? 'ARKETIM' : 'PAGESE',
        { content: `${e.val.toFixed(2)} €`, styles: { fontStyle: 'bold', textColor: e.type === 'in' ? [0, 120, 0] : [200, 0, 0] } }
    ]);

    doc.autoTable({
        startY: 95,
        head: [['#', 'DATA', 'PERSHKRIMI', 'LLOJI', 'VLERA']],
        body: rows,
        theme: 'grid',
        headStyles: {
            fillColor: [30, 30, 30],
            textColor: [255, 255, 255],
            fontSize: 10,
            fontStyle: 'bold',
            halign: 'center',
            cellPadding: 4
        },
        bodyStyles: {
            fontSize: 9,
            cellPadding: 4
        },
        columnStyles: {
            0: { cellWidth: 10, halign: 'center' },
            1: { cellWidth: 30 },
            3: { halign: 'center' },
            4: { halign: 'right' }
        },
        alternateRowStyles: {
            fillColor: [250, 250, 250]
        },
        margin: { left: 15, right: 15 }
    });

    // --- 4. FOOTER ---
    const finalY = doc.lastAutoTable.finalY + 20;
    doc.setDrawColor(200, 200, 200);
    doc.line(15, finalY, 195, finalY);
    
    doc.setFontSize(8);
    doc.setTextColor(150, 150, 150);
    doc.text("Ky raport është gjeneruar automatikisht nga Sistemi APEX OS.", 105, finalY + 10, { align: "center" });
    doc.text("Faqe 1 nga 1", 105, finalY + 15, { align: "center" });

    // Save
    doc.save(`Raporti_${config.name}_${new Date().toLocaleDateString()}.pdf`);
}

    window.onload = () => {
        setAccent(config.accent);
        document.getElementById('displayBizName').innerText = config.name;
        document.getElementById('bizNameIn').value = config.name;
        render();
        setInterval(() => {
            document.getElementById('liveClock').innerText = new Date().toLocaleTimeString('sq-AL');
        }, 1000);
    };
</script>
</body>
</html>
